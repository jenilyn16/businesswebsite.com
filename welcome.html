<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome | Crizel Nail Studio</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
         :root {
            --pink1: #ff3ebf;
            --pink2: #ff66d1;
            --violet: #b74cff;
            --dark: #0a0012;
        }
        
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            color: #fff;
            background: linear-gradient(-45deg, #120021, #32004e, #1b0022, #080006);
            background-size: 400% 400%;
            animation: bgShift 10s ease infinite;
            overflow: hidden;
            position: relative;
        }
        
        @keyframes bgShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        /* Sparkle container */
        
        .sparkles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }
        
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(255, 192, 250, 0.8);
            animation: sparkleAnim 8s linear infinite;
        }
        
        @keyframes sparkleAnim {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }
        /* LOGO */
        
        .logo {
            width: 150px;
            height: auto;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeIn 1.5s ease forwards 0.3s, pulseGlow 3s infinite ease-in-out alternate;
            filter: drop-shadow(0 0 12px rgba(255, 62, 191, 0.6));
            z-index: 1;
        }
        
        @keyframes pulseGlow {
            0% {
                filter: drop-shadow(0 0 10px rgba(255, 62, 191, 0.5));
                transform: scale(1);
            }
            100% {
                filter: drop-shadow(0 0 25px rgba(255, 62, 191, 0.9));
                transform: scale(1.05);
            }
        }
        /* ICONS */
        
        .welcome-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 18px;
            z-index: 1;
        }
        
        .icon {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--pink1), var(--pink2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 0 20px rgba(255, 62, 191, 0.5);
            animation: float 3s ease-in-out infinite alternate, glow 2.5s ease-in-out infinite alternate;
        }
        
        .icon:nth-child(1) {
            animation-delay: 0s;
        }
        
        .icon:nth-child(2) {
            animation-delay: 0.5s;
        }
        
        .icon:nth-child(3) {
            animation-delay: 1s;
        }
        
        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            100% {
                transform: translateY(-15px);
            }
        }
        
        @keyframes glow {
            0% {
                box-shadow: 0 0 15px rgba(255, 62, 191, 0.3);
            }
            100% {
                box-shadow: 0 0 30px rgba(255, 62, 191, 0.7);
            }
        }
        /* TEXT */
        
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: 1px;
            opacity: 0;
            animation: fadeInUp 1.5s ease forwards 1s;
            z-index: 1;
        }
        
        h1 span {
            background: linear-gradient(90deg, var(--pink1), var(--violet));
            -webkit-background-clip: text;
            color: transparent;
        }
        
        p {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 8px;
            opacity: 0;
            animation: fadeInUp 1.5s ease forwards 1.5s;
            z-index: 1;
        }
        /* BUTTON */
        
        .enter-btn {
            margin-top: 25px;
            background: linear-gradient(90deg, var(--pink1), var(--violet));
            color: white;
            border: none;
            border-radius: 28px;
            padding: 12px 28px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 62, 191, 0.4);
            opacity: 0;
            animation: fadeInUp 1.6s ease forwards 2s;
            transition: all 0.3s ease;
            z-index: 1;
        }
        
        .enter-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 50px rgba(255, 62, 191, 0.6);
            letter-spacing: 1px;
        }
        /* TEXT/LOGO animation */
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <!-- ✨ Floating sparkles -->
    <div class="sparkles" id="sparkles"></div>

    <!-- 💅 Logo -->
    <img src="LOGO CRIZEL.png" alt="Crizel Nail Studio Logo" class="logo">

    <!-- 🌸 Icons -->
    <div class="welcome-icons">
        <div class="icon">💅</div>
        <div class="icon">🌷</div>
        <div class="icon">✨</div>
    </div>

    <!-- 💖 Text -->
    <h1>Welcome To <span>Crizel Nail Studio</span></h1>
    <p>Where Beauty Meets Perfection 💖</p>

    <!-- 🎀 Button -->
    <button class="enter-btn" onclick="enterSite()">Enter Website</button>

    <!-- 🎶 Background music -->
    <audio id="bgMusic" src="relaxing.mp4" autoplay loop></audio>

    <script>
        // Fade transition
        function enterSite() {
            document.body.style.transition = "opacity 1s ease";
            document.body.style.opacity = 0;
            const music = document.getElementById('bgMusic');
            if (music) {
                music.volume = 0.3;
                music.pause();
            }
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1000);
        }

        // Auto redirect
        setTimeout(() => enterSite(), 7000);

        // 🌟 Generate sparkles dynamically
        const sparkleContainer = document.getElementById('sparkles');
        for (let i = 0; i < 30; i++) {
            const s = document.createElement('div');
            s.classList.add('sparkle');
            s.style.left = Math.random() * 100 + '%';
            s.style.animationDelay = Math.random() * 8 + 's';
            s.style.animationDuration = 6 + Math.random() * 5 + 's';
            sparkleContainer.appendChild(s);
        }
    </script>
</body>

</html>
